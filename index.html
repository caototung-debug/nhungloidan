<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào Mừng</title>

    <!-- Chuyển sang nhungloidan.html sau 5 giây -->
    <meta http-equiv="refresh" content="5;url=nhungloidan.html">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            overflow:hidden;
        }

        .background{

            width:100%;
            height:100vh;

            background:
                linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
                url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1920&q=80");

            background-size:cover;
            background-position:center;

            position:relative;

        }

        /* Máy bay */

        .airplane{

            position:absolute;

            font-size:65px;

            left:-120px;

            top:18%;

            animation:fly 5s linear infinite;

        }

        @keyframes fly{

            from{

                left:-120px;
                top:20%;

            }

            to{

                left:110%;
                top:8%;

            }

        }

        /* Hoa anh đào */

        .sakura{

            position:absolute;

            top:-50px;

            font-size:30px;

            animation:fall linear infinite;

        }

        .s1{
            left:10%;
            animation-duration:8s;
        }

        .s2{
            left:35%;
            animation-duration:10s;
        }

        .s3{
            left:60%;
            animation-duration:9s;
        }

        .s4{
            left:85%;
            animation-duration:11s;
        }

        @keyframes fall{

            from{
                transform:translateY(-100px) rotate(0deg);
            }

            to{
                transform:translateY(110vh) rotate(360deg);
            }

        }

        /* Khung */

        .message{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            width:min(90%,650px);

            background:rgba(255,255,255,.9);

            padding:35px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 30px rgba(0,0,0,.35);

        }

        .message h1{

            color:#d81b60;

            font-size:42px;

            margin-bottom:20px;

        }

        .message p{

            color:#444;

            font-size:22px;

            line-height:1.7;

        }

        /* Thanh loading */

        .loading{

            margin-top:25px;

        }

        .bar{

            width:100%;
            height:12px;

            background:#ddd;

            border-radius:30px;

            overflow:hidden;

        }

        .progress{

            width:0;

            height:100%;

            background:#e91e63;

            animation:load 5s linear forwards;

        }

        @keyframes load{

            from{
                width:0;
            }

            to{
                width:100%;
            }

        }

        /* Responsive */

        @media(max-width:768px){

            .message{

                width:92%;

                padding:22px;

            }

            .message h1{

                font-size:30px;

            }

            .message p{

                font-size:18px;

            }

            .airplane{

                font-size:45px;

            }

            .sakura{

                font-size:22px;

            }

        }

    </style>

</head>

<body>

<div class="background">

    <div class="airplane">✈️</div>

    <div class="sakura s1">🌸</div>
    <div class="sakura s2">🌸</div>
    <div class="sakura s3">🌸</div>
    <div class="sakura s4">🌸</div>

    <div class="message">

        <h1>🌸 Chào Mừng 🌸</h1>

        <p>
            Máy bay đang đưa bạn đến đất nước Nhật Bản...
            <br><br>
            Hãy cùng khám phá những lời chúc ý nghĩa nhất.
        </p>

        <div class="loading">

            <div class="bar">

                <div class="progress"></div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
