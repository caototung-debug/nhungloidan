<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chào Mừng</title>

    <!-- Chuyển sang trang lời chúc sau 5 giây -->
    <meta http-equiv="refresh" content="5;url=nhungloichuc.html">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            overflow:hidden;
        }

        .background{

            width:100%;
            height:100vh;

            background:
                url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1920&q=80")
                no-repeat center;

            background-size:cover;

            position:relative;

        }

        .overlay{

            position:absolute;

            width:100%;
            height:100%;

            background:rgba(0,0,0,.28);

        }

        /* Máy bay */

        .airplane{

            position:absolute;

            top:18%;
            left:-120px;

            font-size:65px;

            animation:fly 5s linear infinite;

        }

        @keyframes fly{

            from{

                left:-120px;
                top:20%;

            }

            to{

                left:110%;
                top:8%;

            }

        }

        /* Hoa anh đào */

        .sakura{

            position:absolute;

            top:-40px;

            font-size:30px;

            animation:fall linear infinite;

        }

        .s1{

            left:10%;
            animation-duration:8s;

        }

        .s2{

            left:35%;
            animation-duration:10s;

        }

        .s3{

            left:60%;
            animation-duration:9s;

        }

        .s4{

            left:85%;
            animation-duration:11s;

        }

        @keyframes fall{

            from{

                transform:translateY(-100px) rotate(0deg);

            }

            to{

                transform:translateY(110vh) rotate(360deg);

            }

        }

        /* Khung */

        .message{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            width:min(92%,650px);

            padding:35px;

            background:rgba(255,255,255,.88);

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 30px rgba(0,0,0,.35);

        }

        .message h1{

            color:#c2185b;

            font-size:40px;

            margin-bottom:20px;

        }

        .message p{

            color:#444;

            font-size:22px;

            line-height:1.7;

        }

        /* Thanh Loading */

        .loading{

            margin-top:25px;

        }

        .bar{

            width:100%;
            height:12px;

            background:#ddd;

            border-radius:20px;

            overflow:hidden;

        }

        .progress{

            width:0;

            height:100%;

            background:#e91e63;

            animation:load 5s linear forwards;

        }

        @keyframes load{

            from{
                width:0;
            }

            to{
                width:100%;
            }

        }

        /* Responsive */

        @media(max-width:768px){

            .airplane{

                font-size:45px;

            }

            .message{

                width:92%;

                padding:22px;

            }

            .message h1{

                font-size:30px;

            }

            .message p{

                font-size:18px;

            }

            .sakura{

                font-size:22px;

            }

        }

    </style>

</head>

<body>

<div class="background">

    <div class="overlay"></div>

    <div class="airplane">✈️</div>

    <div class="sakura s1">🌸</div>
    <div class="sakura s2">🌸</div>
    <div class="sakura s3">🌸</div>
    <div class="sakura s4">🌸</div>

    <div class="message">

        <h1>🌸 Chào Mừng 🌸</h1>

        <p>

            Máy bay đang đưa bạn đến đất nước Nhật Bản...

            <br><br>

            Hãy cùng khám phá những lời chúc ý nghĩa nhất.

        </p>

        <div class="loading">

            <div class="bar">

                <div class="progress"></div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
