<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Những Lời Chúc Nhật Bản</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            overflow:hidden;
            font-family:"Times New Roman",serif;
        }

        /* ===== NỀN NHẬT BẢN ===== */

        .scene{

            width:100%;
            height:100vh;

            background:
                linear-gradient(
                rgba(255,255,255,.25),
                rgba(255,220,220,.4)
                ),
                url("https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1920&q=80");

            background-size:cover;
            background-position:center;
            position:relative;

            animation:bg 15s infinite alternate;

        }

        @keyframes bg{
            from{
                background-size:100%;
            }

            to{
                background-size:110%;
            }
        }

        /* ===== MẶT TRỜI ===== */

        .sun{

            position:absolute;

            width:150px;
            height:150px;

            background:#ff5252;

            border-radius:50%;

            top:80px;
            right:180px;

            box-shadow:0 0 40px #ff8a80;

        }

        /* ===== HOA ANH ĐÀO ===== */

        .sakura{

            position:absolute;

            top:-50px;

            font-size:35px;

            animation:drop linear infinite;

        }

        .s1{
            left:10%;
            animation-duration:9s;
        }

        .s2{
            left:30%;
            animation-duration:12s;
        }

        .s3{
            left:55%;
            animation-duration:10s;
        }

        .s4{
            left:80%;
            animation-duration:13s;
        }

        @keyframes drop{

            from{
                transform:translateY(-100px) rotate(0);
            }

            to{
                transform:translateY(110vh) rotate(360deg);
            }

        }

        /* ===== CỔNG TORII ===== */

        .torii{

            position:absolute;

            bottom:0;
            left:70px;

            font-size:180px;

        }

        /* ===== LÁ TRE ===== */

        .bamboo{

            position:absolute;

            right:30px;
            bottom:0;

            font-size:130px;

        }

        /* ===== KHUNG LỜI CHÚC ===== */

        .card{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            width:650px;

            padding:45px;

            background:rgba(255,255,255,.88);

            border-radius:20px;

            text-align:center;

            border:5px solid #c62828;

            box-shadow:0 0 40px rgba(120,0,0,.4);

            animation:appear 2s;

        }

        @keyframes appear{

            from{

                opacity:0;

                transform:translate(-50%,-30%);

            }

            to{

                opacity:1;

                transform:translate(-50%,-50%);

            }

        }

        h1{

            color:#b71c1c;

            font-size:42px;

            margin-bottom:20px;

            letter-spacing:3px;

        }

        p{

            font-size:22px;

            color:#4e342e;

            line-height:1.8;

        }

        .wish{

            margin-top:25px;

            background:#fff5f5;

            padding:25px;

            border-radius:15px;

            font-size:20px;

            color:#6d1b1b;

            animation:float 3s infinite;

        }

        @keyframes float{

            0%,100%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-10px);
            }

        }

        button{

            margin-top:25px;

            padding:12px 35px;

            border:none;

            background:#b71c1c;

            color:white;

            border-radius:30px;

            font-size:18px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#880e4f;

            transform:scale(1.1);

        }

    </style>

</head>

<body>

    <div class="scene">

        <div class="sun"></div>

        <div class="sakura s1">🌸</div>
        <div class="sakura s2">🌸</div>
        <div class="sakura s3">🌸</div>
        <div class="sakura s4">🌸</div>

        <div class="torii">⛩️</div>

        <div class="bamboo">🎋</div>

        <div class="card">

            <h1>🌸 Những Lời Chúc 🌸</h1>

            <p>
                心からの願い<br>
                (Những lời chúc xuất phát từ trái tim)
            </p>

            <div class="wish">

                🌸 Chúc bạn luôn bình an và hạnh phúc.<br><br>

                🎋 Mong mọi ước mơ đều trở thành hiện thực.<br><br>

                ⛩️ Chúc mỗi ngày của bạn đều tràn đầy may mắn.

            </div>

            <button onclick="alert('幸せになりますように 🌸')">
                Nhận lời chúc
            </button>

        </div>

    </div>

</body>
</html>
