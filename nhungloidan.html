<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Những Lời Chúc Nhật Bản</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Times New Roman",serif;
            overflow:hidden;
        }

        .scene{
            width:100%;
            height:100vh;

            background:
                linear-gradient(rgba(255,255,255,.25),rgba(255,220,220,.4)),
                url("https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1920&q=80");

            background-size:cover;
            background-position:center;
            position:relative;

            animation:bg 15s infinite alternate;
        }

        @keyframes bg{
            from{
                background-size:100%;
            }
            to{
                background-size:110%;
            }
        }

        /* Mặt trời */

        .sun{
            position:absolute;

            width:140px;
            height:140px;

            background:#ff5252;
            border-radius:50%;

            top:70px;
            right:160px;

            box-shadow:0 0 40px #ff8a80;
        }

        /* Hoa anh đào */

        .sakura{
            position:absolute;
            top:-40px;
            font-size:32px;
            animation:drop linear infinite;
        }

        .s1{
            left:10%;
            animation-duration:9s;
        }

        .s2{
            left:30%;
            animation-duration:12s;
        }

        .s3{
            left:55%;
            animation-duration:10s;
        }

        .s4{
            left:80%;
            animation-duration:13s;
        }

        @keyframes drop{
            from{
                transform:translateY(-100px) rotate(0deg);
            }
            to{
                transform:translateY(110vh) rotate(360deg);
            }
        }

        /* Cổng Torii */

        .torii{
            position:absolute;
            left:20px;
            bottom:0;
            font-size:150px;
        }

        /* Tre */

        .bamboo{
            position:absolute;
            right:20px;
            bottom:0;
            font-size:120px;
        }

        /* Khung */

        .card{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            width:min(92%,650px);

            background:rgba(255,255,255,.9);

            padding:35px;

            border-radius:20px;

            text-align:center;

            border:5px solid #c62828;

            box-shadow:0 0 35px rgba(0,0,0,.3);

            animation:appear 1.5s;
        }

        @keyframes appear{

            from{
                opacity:0;
                transform:translate(-50%,-35%);
            }

            to{
                opacity:1;
                transform:translate(-50%,-50%);
            }

        }

        h1{
            color:#b71c1c;
            font-size:42px;
            margin-bottom:20px;
        }

        p{
            color:#4e342e;
            font-size:22px;
            line-height:1.7;
        }

        .wish{

            margin-top:25px;

            padding:20px;

            background:#fff5f5;

            border-radius:15px;

            font-size:20px;

            color:#6d1b1b;

            animation:float 3s infinite;

        }

        @keyframes float{

            0%,100%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-8px);
            }

        }

        button{

            margin-top:25px;

            padding:14px 35px;

            background:#b71c1c;

            color:white;

            border:none;

            border-radius:30px;

            font-size:18px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#880e4f;

            transform:scale(1.08);

        }

        /* Responsive */

        @media(max-width:768px){

            .card{
                width:92%;
                padding:22px;
            }

            h1{
                font-size:28px;
            }

            p{
                font-size:18px;
            }

            .wish{
                font-size:16px;
            }

            button{
                width:100%;
            }

            .sun{
                width:90px;
                height:90px;
                top:20px;
                right:20px;
            }

            .torii{
                font-size:90px;
                left:5px;
            }

            .bamboo{
                font-size:70px;
                right:5px;
            }

            .sakura{
                font-size:22px;
            }

        }

    </style>

</head>

<body>

<div class="scene">

    <div class="sun"></div>

    <div class="sakura s1">🌸</div>
    <div class="sakura s2">🌸</div>
    <div class="sakura s3">🌸</div>
    <div class="sakura s4">🌸</div>

    <div class="torii">⛩️</div>

    <div class="bamboo">🎋</div>

    <div class="card">

        <h1>🌸 Những Lời Chúc 🌸</h1>

        <p>
            心からの願い<br>
            (Những lời chúc xuất phát từ trái tim)
        </p>

        <div class="wish">

            🌸 Chúc bạn luôn bình an và hạnh phúc.<br><br>

            🎋 Mong mọi ước mơ đều trở thành hiện thực.<br><br>

            ⛩️ Chúc mỗi ngày của bạn đều tràn đầy may mắn.

        </div>

        <button onclick="alert('幸せになりますように 🌸')">
            Nhận lời chúc
        </button>

    </div>

</div>

</body>
</html>
