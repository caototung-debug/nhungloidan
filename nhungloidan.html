<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lời Chúc</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Times New Roman",serif;
    overflow:hidden;
}

.scene{

    width:100%;
    height:100vh;

    background:
    linear-gradient(rgba(255,255,255,.25),rgba(255,220,220,.45)),
    url("https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1920&q=80");

    background-size:cover;
    background-position:center;
    position:relative;

}

/* Mặt trời */

.sun{

    position:absolute;

    width:140px;
    height:140px;

    background:#ff4b4b;

    border-radius:50%;

    top:50px;
    right:120px;

    box-shadow:0 0 45px #ff8a80;

}

/* Hoa */

.sakura{

    position:absolute;

    top:-60px;

    font-size:30px;

    animation:fall linear infinite;

}

.s1{left:10%;animation-duration:8s;}
.s2{left:30%;animation-duration:10s;}
.s3{left:55%;animation-duration:9s;}
.s4{left:80%;animation-duration:11s;}

@keyframes fall{

from{

transform:translateY(-100px) rotate(0deg);

}

to{

transform:translateY(110vh) rotate(360deg);

}

}

/* Torii */

.torii{

position:absolute;

left:20px;
bottom:0;

font-size:150px;

}

/* Tre */

.bamboo{

position:absolute;

right:15px;
bottom:0;

font-size:120px;

}

/* Card */

.card{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:min(92%,650px);

padding:35px;

background:rgba(255,255,255,.9);

border-radius:20px;

border:4px solid #b71c1c;

box-shadow:0 0 30px rgba(0,0,0,.3);

text-align:center;

}

.card h1{

color:#b71c1c;

font-size:40px;

margin-bottom:20px;

}

.card p{

font-size:22px;

line-height:1.7;

color:#4e342e;

}

.wish{

margin-top:25px;

padding:20px;

background:#fff5f5;

border-radius:15px;

font-size:20px;

color:#6d1b1b;

}

button{

margin-top:25px;

padding:14px 35px;

font-size:18px;

background:#c62828;

color:white;

border:none;

border-radius:30px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#880e4f;

transform:scale(1.08);

}

/* Responsive */

@media(max-width:768px){

.sun{

width:80px;
height:80px;

top:20px;
right:20px;

}

.torii{

font-size:80px;

left:5px;

}

.bamboo{

font-size:65px;

right:5px;

}

.card{

width:92%;

padding:20px;

}

.card h1{

font-size:28px;

}

.card p{

font-size:18px;

}

.wish{

font-size:16px;

}

button{

width:100%;

}

.sakura{

font-size:20px;

}

}

</style>

</head>

<body>

<div class="scene">

<div class="sun"></div>

<div class="sakura s1">🌸</div>
<div class="sakura s2">🌸</div>
<div class="sakura s3">🌸</div>
<div class="sakura s4">🌸</div>

<div class="torii">⛩️</div>

<div class="bamboo">🎋</div>

<div class="card">

<h1>🌸 Những Lời Chúc 🌸</h1>

<p>

心からの願い

<br><br>

(Những lời chúc xuất phát từ trái tim)

</p>

<div class="wish">

🌸 Chúc bạn luôn bình an và hạnh phúc.<br><br>

🎋 Mong mọi ước mơ đều trở thành hiện thực.<br><br>

⛩️ Chúc mỗi ngày của bạn đều tràn đầy may mắn.

</div>

<button onclick="alert('幸せになりますように 🌸')">

Nhận lời chúc

</button>

</div>

</div>

</body>

</html>
